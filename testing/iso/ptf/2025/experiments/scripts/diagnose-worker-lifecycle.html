<!DOCTYPE html>
<html>
<head>
    <title>Worker Lifecycle Diagnostic</title>
    <meta charset="utf-8" />
    <script type="importmap">
        {
            "imports": {
                "pdf-lib": "../../packages/pdf-lib/pdf-lib.esm.js",
                "icc": "../../packages/icc/index.js",
                "pako": "../../packages/pako/dist/pako.mjs"
            }
        }
    </script>
    <style>
        body { font-family: monospace; margin: 2em; background: #1a1a2e; color: #e0e0e0; }
        h1 { color: #66aa99; }
        pre { white-space: pre-wrap; line-height: 1.5; }
        .pass { color: #4caf50; }
        .fail { color: #f44336; }
        .info { color: #64b5f6; }
        .warn { color: #ffb74d; }
        .step { color: #ce93d8; font-weight: bold; }
        button { font-size: 1.2em; padding: 0.5em 1em; margin: 0.5em; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Worker Lifecycle Diagnostic</h1>
    <p>Tests each stage of the worker-pool-entrypoint lifecycle in the browser.</p>
    <button id="run">Run Diagnostic</button>
    <pre id="output"></pre>

    <script type="module">
        const output = document.getElementById('output');
        const runButton = document.getElementById('run');

        function log(message, className = 'info') {
            const line = document.createElement('span');
            line.className = className;
            line.textContent = `[${new Date().toISOString().slice(11, 23)}] ${message}\n`;
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }

        function step(name) {
            log(`--- ${name} ---`, 'step');
        }

        /**
         * Resolve the pako entrypoint URL from the main thread importmap.
         * Workers do NOT inherit importmaps, so we resolve here and send to worker.
         */
        function resolvePakoEntrypoint() {
            try {
                return import.meta.resolve('pako');
            } catch (e) {
                log(`import.meta.resolve('pako') failed: ${e.message}`, 'warn');
                // Fallback: construct URL manually
                return new URL('../../packages/pako/dist/pako.mjs', import.meta.url).href;
            }
        }

        async function runDiagnostic() {
            output.textContent = '';
            runButton.disabled = true;

            const workerURL = new URL(
                '../../classes/baseline/worker-pool-entrypoint.js',
                import.meta.url
            ).href;

            const pakoEntrypoint = resolvePakoEntrypoint();

            log(`Worker URL: ${workerURL}`);
            log(`Pako entrypoint: ${pakoEntrypoint}`);
            log(`import.meta.url: ${import.meta.url}`);

            // ================================================================
            // Stage 1: Create Worker
            // ================================================================
            step('Stage 1: Create Worker');

            let worker;
            try {
                const t0 = performance.now();
                worker = new Worker(workerURL, { type: 'module' });
                log(`Worker created in ${(performance.now() - t0).toFixed(1)}ms`, 'pass');
            } catch (e) {
                log(`Worker creation FAILED: ${e.message}`, 'fail');
                log(`Stack: ${e.stack}`, 'fail');
                runButton.disabled = false;
                return;
            }

            // ================================================================
            // Stage 2: Wait for 'ready' message
            // ================================================================
            step('Stage 2: Wait for ready signal');

            const readyResult = await new Promise((resolve) => {
                const t0 = performance.now();
                const timeout = setTimeout(() => {
                    resolve({ success: false, error: 'Timeout after 15s waiting for ready', duration: 15000 });
                }, 15000);

                worker.onerror = (event) => {
                    clearTimeout(timeout);
                    resolve({
                        success: false,
                        error: `Worker error event: ${event.message} (${event.filename}:${event.lineno}:${event.colno})`,
                        duration: performance.now() - t0,
                    });
                };

                worker.onmessage = (event) => {
                    if (event.data?.type === 'ready') {
                        clearTimeout(timeout);
                        resolve({ success: true, duration: performance.now() - t0 });
                    } else {
                        log(`Unexpected message before ready: ${JSON.stringify(event.data)}`, 'warn');
                    }
                };
            });

            if (readyResult.success) {
                log(`Worker ready in ${readyResult.duration.toFixed(1)}ms`, 'pass');
            } else {
                log(`Worker ready FAILED (${readyResult.duration.toFixed(1)}ms): ${readyResult.error}`, 'fail');
                worker.terminate();
                runButton.disabled = false;
                return;
            }

            // Set up persistent message/error handlers
            let pendingResolve = null;
            worker.onmessage = (event) => {
                if (pendingResolve) {
                    pendingResolve(event.data);
                    pendingResolve = null;
                } else {
                    log(`Unhandled message: ${JSON.stringify(event.data).slice(0, 200)}`, 'warn');
                }
            };
            worker.onerror = (event) => {
                log(`Worker error: ${event.message} (${event.filename}:${event.lineno})`, 'fail');
                if (pendingResolve) {
                    pendingResolve({ success: false, error: event.message });
                    pendingResolve = null;
                }
            };

            function sendAndWait(message, label, timeoutMs = 30000) {
                return new Promise((resolve) => {
                    const t0 = performance.now();
                    const timeout = setTimeout(() => {
                        pendingResolve = null;
                        resolve({ success: false, error: `Timeout after ${timeoutMs}ms`, duration: timeoutMs });
                    }, timeoutMs);

                    pendingResolve = (data) => {
                        clearTimeout(timeout);
                        resolve({ ...data, duration: performance.now() - t0 });
                    };

                    try {
                        worker.postMessage(message);
                        log(`Sent ${label}`, 'info');
                    } catch (e) {
                        clearTimeout(timeout);
                        pendingResolve = null;
                        resolve({ success: false, error: `postMessage failed: ${e.message}`, duration: 0 });
                    }
                });
            }

            // ================================================================
            // Stage 3: Send shared-config
            // ================================================================
            step('Stage 3: Send shared-config');

            // shared-config does NOT send a response, so we just fire-and-forget
            try {
                worker.postMessage({
                    type: 'shared-config',
                    pakoPackageEntrypoint: pakoEntrypoint,
                    renderingIntent: 'relative-colorimetric',
                    blackPointCompensation: true,
                    useAdaptiveBPCClamping: false,
                    destinationColorSpace: 'CMYK',
                    // destinationProfile and intermediateProfiles omitted for now
                    // (they require actual ICC profile ArrayBuffers)
                });
                log('shared-config sent (no response expected)', 'pass');
            } catch (e) {
                log(`shared-config send FAILED: ${e.message}`, 'fail');
            }

            // Small delay to allow message processing
            await new Promise(r => setTimeout(r, 100));

            // ================================================================
            // Stage 4: Send 'init' task (triggers lazy initialization)
            // ================================================================
            step('Stage 4: Init task (triggers module loading + WASM init)');

            const initResult = await sendAndWait(
                { type: 'init', taskId: 0 },
                'init task',
                30000  // 30s — WASM loading can be slow
            );

            if (initResult.success) {
                log(`Init task completed in ${initResult.duration.toFixed(1)}ms`, 'pass');
            } else {
                log(`Init task FAILED (${(initResult.duration || 0).toFixed(1)}ms): ${initResult.error}`, 'fail');
                log('This means the worker could not load the color engine or compression library.', 'fail');
                log('Check the browser console for more details (module load errors, WASM fetch failures, etc.)', 'warn');
                worker.terminate();
                runButton.disabled = false;
                return;
            }

            // ================================================================
            // Stage 5: Send minimal image task
            // ================================================================
            step('Stage 5: Minimal image task (1x1 RGB pixel)');

            // Create a 1x1 RGB pixel (red)
            const pixelData = new Uint8Array([255, 0, 0]);

            const imageResult = await sendAndWait(
                {
                    type: 'image',
                    taskId: 1,
                    pixelBuffer: pixelData.buffer,
                    isCompressed: false,
                    width: 1,
                    height: 1,
                    colorSpace: 'RGB',
                    bitsPerComponent: 8,
                    streamRef: 'diagnostic-1x1-rgb',
                    // Without destinationProfile, this will use sharedConfig.destinationProfile
                    // which is undefined — the converter should error about missing profile
                    renderingIntent: 'relative-colorimetric',
                    blackPointCompensation: true,
                    useAdaptiveBPCClamping: false,
                    destinationColorSpace: 'CMYK',
                    verbose: true,
                },
                'image task (1x1 RGB)',
                30000
            );

            if (imageResult.success) {
                log(`Image task completed in ${imageResult.duration.toFixed(1)}ms`, 'pass');
                log(`  pixelCount: ${imageResult.pixelCount}`, 'info');
                log(`  bitsPerComponent: ${imageResult.bitsPerComponent}`, 'info');
                log(`  isCompressed: ${imageResult.isCompressed}`, 'info');
            } else {
                log(`Image task FAILED (${(imageResult.duration || 0).toFixed(1)}ms): ${imageResult.error}`, 'fail');
                log('This is expected if no destination ICC profile was provided.', 'warn');
                log('The important thing is that the worker DID process the task (not a module load failure).', 'info');
            }

            // ================================================================
            // Stage 6: Send benchmark task
            // ================================================================
            step('Stage 6: Benchmark task');

            const benchResult = await sendAndWait(
                { type: 'benchmark', taskId: 2, iterations: 1, arraySize: 100 },
                'benchmark task',
                10000
            );

            if (benchResult.success) {
                log(`Benchmark task completed in ${benchResult.duration.toFixed(1)}ms`, 'pass');
            } else {
                log(`Benchmark task FAILED: ${benchResult.error}`, 'fail');
            }

            // ================================================================
            // Summary
            // ================================================================
            step('Summary');
            log('Worker lifecycle diagnostic complete.', 'info');
            log('If Stage 2 (ready) passed but Stage 4 (init) failed:', 'info');
            log('  → Module loading issue (color engine, WASM, pako, or import attributes)', 'info');
            log('If Stage 4 (init) passed but Stage 5 (image) failed:', 'info');
            log('  → Task processing issue (missing profile, conversion logic)', 'info');
            log('Check the browser DevTools console for additional error details.', 'info');

            worker.terminate();
            log('Worker terminated.', 'info');
            runButton.disabled = false;
        }

        runButton.addEventListener('click', runDiagnostic);
    </script>
</body>
</html>
